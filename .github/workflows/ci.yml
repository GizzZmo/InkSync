name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  api-test:
    name: API Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: inksync_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --workspaces --if-present

      - name: Generate Prisma client
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/inksync_test
        run: npx prisma generate

      - name: Build API
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/inksync_test
          JWT_SECRET: test-jwt-secret-minimum-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-chars-long
        run: npm run build

      - name: Run API Tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/inksync_test
          JWT_SECRET: test-jwt-secret-minimum-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-chars-long
          NODE_ENV: test
        run: npm test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --workspaces --if-present
      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate
      - name: TypeScript check (shared)
        working-directory: packages/shared
        run: npx tsc --noEmit
      - name: Build shared (for API typings)
        working-directory: packages/shared
        run: npx tsc
      - name: TypeScript check (API)
        working-directory: apps/api
        run: npx tsc --noEmit
